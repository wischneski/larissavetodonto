    <style>
      /* Critical CSS - Reset e base */
      *,::before,::after{box-sizing:border-box;border:0 solid}

      .font-display{font-family:'Playfair Display',ui-serif,Georgia,serif}

      .font-light{font-weight:300}
      .font-serif{font-family:'Playfair Display',ui-serif,Georgia,serif}

      .w-full{width:100%}
      .h-full{height:100%}
      .w-4{width:1rem}
      .h-4{height:1rem}
      .max-w-lg{max-width:32rem}
      .max-w-\[280px\]{max-width:280px}
      
      /* Visual */
      .overflow-hidden{overflow:hidden}
      .rounded-full{border-radius:9999px}
      .rounded-xl{border-radius:0.75rem}
      .rounded-4xl{border-radius:2rem}
      .rounded-t-\[5rem\]{border-top-left-radius:5rem;border-top-right-radius:5rem}
      .rounded-b-4xl{border-bottom-left-radius:2rem;border-bottom-right-radius:2rem}
      .border-4{border-width:4px}
      .shadow-xl{box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1)}
      .shadow-2xl{box-shadow:0 25px 50px -12px rgb(0 0 0 / 0.25)}
      .object-cover{object-fit:cover}
      .object-center{object-position:center}
      .bg-transparent{background-color:transparent}
      .bg-white{background-color:#fff}
      .border{border-width:1px}
      .opacity-60{opacity:0.6}
      .blur-3xl{filter:blur(64px)}
      
      /* Transitions */
      .transition-all{transition-property:all;transition-timing-function:cubic-bezier(0.4,0,0.2,1);transition-duration:150ms}
      
      /* Container */
      .container{width:100%;margin-left:auto;margin-right:auto;padding-left:1rem;padding-right:1rem}
      @media(min-width:640px){.container{max-width:640px}}
      @media(min-width:768px){.container{max-width:768px}}
      @media(min-width:1024px){.container{max-width:1024px}}
      @media(min-width:1280px){.container{max-width:1280px}}
      
      /* Responsive - md breakpoint */
      @media(min-width:768px){
        .md\:grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
        .md\:flex{display:flex}
        .md\:hidden{display:none}

        .md\:px-8{padding-left:2rem;padding-right:2rem}
        .md\:py-4{padding-top:1rem;padding-bottom:1rem}
        .md\:gap-4{gap:1rem}
        .md\:gap-12{gap:3rem}
        .md\:max-w-md{max-width:28rem}
        .md\:border-8{border-width:8px}
        .md\:rounded-t-\[10rem\]{border-top-left-radius:10rem;border-top-right-radius:10rem}
        .md\:min-h-screen{min-height:100vh}
      }
      @media(min-width:640px){
        .sm\:flex-row{flex-direction:row}
      }
      
      /* Animations */
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      .animate-spin{animation:spin 1s linear infinite}
      .animate-fade-in{animation:fadeIn 0.8s ease-out forwards;opacity:0}
      .animate-fade-in-up{animation:fadeInUp 0.8s ease-out forwards;opacity:0}
      
      /* Glass card effect */
      .glass-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
      
      /* Header styles */
      .backdrop-blur-md{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
      .bg-white\/80{background-color:rgb(255 255 255 / 0.8)}
      .shadow-sm{box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05)}
